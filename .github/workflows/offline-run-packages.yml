name: offline-run-packages

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build-gateway-api-run
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate package files
        shell: bash
        run: |
          bash -n build.sh install.sh
          grep -qx '__PAYLOAD_BELOW__' install.sh

      - name: Build offline package
        shell: bash
        run: |
          bash build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gateway-api-run
          path: |
            dist/*.run
            dist/*.sha256
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
